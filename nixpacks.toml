# On ne garde QUE le provider PHP – pas de "node"
providers = ["php"]

[variables]
    NIXPACKS_PHP_VERSION = "8.2"
    # Pas besoin de NODE_VERSION ici, on l'installe manuellement

[phases.install]
    cmds = [
        # Installation manuelle de Node 20 (l'image de base est Ubuntu)
        "curl -fsSL https://deb.nodesource.com/setup_20.x | bash -",
        "apt-get install -y nodejs",
        # Maintenant que Node est dispo, on peut lancer npm et composer
        "composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist",
        "npm ci"
    ]

[phases.build]
    cmds = [
        "npm run build",
        "php artisan config:cache",
        "php artisan route:cache",
        "php artisan view:cache"
    ]

[start]
    # Assure le lien storage, lance les migrations, puis démarre nginx + php-fpm
    cmd = "php artisan storage:link || true && php artisan migrate --force && php-fpm -D && nginx -g 'daemon off;'"